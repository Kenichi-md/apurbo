<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Button</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Red Button */
#waBtn {
    background: red;
    color: white;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Popup box */
#menu {
    display: none;
    position: absolute;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    margin-top: 10px;
}

#menu button {
    display: block;
    width: 150px;
    margin: 5px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.sms { background: #4CAF50; color: white; }
.hi { background: #2196F3; color: white; }
</style>
</head>

<body>

<button id="waBtn">WhatsApp Message</button>

<div id="menu">
    <button class="sms" onclick="sendMsg('Hello')">SMS Send</button>
    <button class="hi" onclick="sendMsg('Hi')">Hi SMS Send</button>
</div>

<script>
// Background image URL (change here)
let bgUrl = "https://images.unsplash.com/photo-1520975916090-3105956dac38";
document.body.style.backgroundImage = "url('" + bgUrl + "')";

let btn = document.getElementById("waBtn");
let menu = document.getElementById("menu");

btn.onclick = function() {
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function sendMsg(text) {
    let number = "918967360566";
    let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(text);
    window.open(url, "_blank");
    menu.style.display = "none";
}
</script>

</body>
</html>
