<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp DP Preview</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#000;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://i.imgur.com/maXzTgz.jpeg') center/cover;
filter:blur(18px);
transform:scale(1.2);
z-index:-1;
}

.card{
width:350px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
border-radius:25px;
padding:20px;
text-align:center;
color:white;
}

.dp{
width:220px;
height:220px;
border-radius:50%;
border:6px solid #25D366;
object-fit:cover;
margin:auto;
display:block;
}

h2{
margin-top:15px;
font-size:22px;
}

p{
opacity:.8;
margin-top:5px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
outline:none;
}

.file{
background:#25D366;
color:white;
cursor:pointer;
}

.btn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

<img id="preview"
class="dp"
src="https://i.imgur.com/2DhmtJ4.png">

<input type="text"
placeholder="WhatsApp Number">

<input type="file"
id="fileInput"
class="file"
accept="image/*">

<h2>⎯ ꯭᪳𝐀ᴘᴜʀʙᴏ-𝐃ᴀs⎯꯭̽⸙ ༎</h2>

<p>© siliguri-boy</p>

<button class="btn">
Upload DP Preview
</button>

</div>

<script>
const fileInput =
document.getElementById('fileInput');

const preview =
document.getElementById('preview');

fileInput.addEventListener('change',e=>{
const file=e.target.files[0];
if(file){
preview.src=
URL.createObjectURL(file);
}
});
</script>

</body>
</html>
