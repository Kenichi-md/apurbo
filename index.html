<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APURBO-DAS Full DP Maker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#151515;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00ffcc30;
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#00ffcc;
}

.upload-box{
border:2px dashed #00ffcc;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-bottom:15px;
}

.upload-box input{
display:none;
}

input[type=text]{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#222;
color:white;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.preview{
margin-top:20px;
width:100%;
height:350px;
background:#222;
border-radius:15px;
overflow:hidden;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#aaa;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
APURBO-DAS
</div>

<label class="upload-box">
📷 Upload Photo
<input type="file" id="imageInput" accept="image/*">
</label>

<input
type="text"
placeholder="Enter WhatsApp Number"
id="number">

<button onclick="generateDP()">
Generate Full DP
</button>

<div class="preview" id="preview">
Preview Here
</div>

<button onclick="downloadImage()">
Download DP
</button>

<div class="footer">
© siliguri-boy
</div>

</div>

<script>

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

let currentImage="";

imageInput.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

currentImage=e.target.result;

preview.innerHTML=
`<img src="${currentImage}">`;

}

reader.readAsDataURL(file);

});

function generateDP(){

const number=
document.getElementById("number").value;

if(!currentImage){
alert("Upload Image First");
return;
}

alert("DP Generated For: "+number);

}

function downloadImage(){

if(!currentImage){
alert("No Image Found");
return;
}

const a=document.createElement("a");
a.href=currentImage;
a.download="APURBO-DAS-DP.png";
a.click();

}

</script>

</body>
</html>
