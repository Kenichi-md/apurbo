<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APURBO-DAS | WhatsApp DP Downloader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* Background Image */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('https://i.imgur.com/maXzTgz.jpeg') center center/cover no-repeat;
    filter:blur(12px);
    transform:scale(1.1);
    z-index:-2;
}

.bg::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

/* Main Box */
.container{
    width:90%;
    max-width:450px;
    background:rgba(22,27,34,0.85);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,170,.4);
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00ffaa;
    margin-bottom:10px;
    text-shadow:0 0 15px #00ffaa;
}

.desc{
    color:#ddd;
    margin-bottom:20px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#0d1117;
    color:white;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ffaa;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    margin-top:20px;
    display:none;
}

.result img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00ffaa;
    box-shadow:0 0 20px #00ffaa;
}

.download{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#00ffaa;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

/* Footer */
footer{
    position:fixed;
    bottom:12px;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <div class="logo">APURBO-DAS</div>

    <div class="desc">
        WhatsApp Profile Picture Downloader
    </div>

    <input type="text" id="number" placeholder="Enter WhatsApp Number">

    <button onclick="getDP()">Download DP</button>

    <div class="result" id="result">
        <img id="dp" src="https://picsum.photos/300">

        <br>

        <a class="download" id="downloadBtn" href="#" download>
            Download Image
        </a>
    </div>

</div>

<footer>
    © siliguri-boy
</footer>

<script>
function getDP(){

    let number = document.getElementById("number").value;

    if(number==""){
        alert("Enter WhatsApp Number");
        return;
    }

    let image =
    "https://picsum.photos/300?random=" +
    Math.floor(Math.random()*1000);

    document.getElementById("dp").src = image;
    document.getElementById("downloadBtn").href = image;
    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
