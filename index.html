<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apurbo Reels Downloader</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#0f0f0f;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:420px;
  background:#fff;
  border-radius:25px;
  padding:30px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
  font-size:34px;
  font-weight:bold;
  color:#E1306C;
  margin-bottom:10px;
}

.desc{
  color:#666;
  margin-bottom:25px;
}

input{
  width:100%;
  height:55px;
  border:none;
  outline:none;
  background:#f1f1f1;
  border-radius:15px;
  padding:0 18px;
  font-size:16px;
}

button{
  width:100%;
  height:55px;
  border:none;
  border-radius:15px;
  background:#E1306C;
  color:#fff;
  font-size:18px;
  margin-top:18px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.03);
}

.result{
  margin-top:25px;
  display:none;
}

video{
  width:100%;
  border-radius:15px;
}

a{
  display:block;
  margin-top:15px;
  background:#111;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">Apurbo</div>
  <div class="desc">Instagram Reels Downloader</div>

  <input type="text" id="url" placeholder="Paste Instagram Reel Link">

  <button onclick="downloadReel()">
    Download Reel
  </button>

  <div class="result" id="result">
    <video id="video" controls></video>

    <a id="downloadBtn" download>
      Download Now
    </a>
  </div>

</div>

<script>
function downloadReel(){

  let url = document.getElementById("url").value

  if(url == ""){
    alert("Paste Reel Link")
    return
  }

  // Demo video preview
  let videoUrl =
  "https://www.w3schools.com/html/mov_bbb.mp4"

  document.getElementById("result").style.display = "block"

  document.getElementById("video").src = videoUrl

  document.getElementById("downloadBtn").href = videoUrl
}
</script>

</body>
</html>
