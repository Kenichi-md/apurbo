<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APURBO-DAS DP Maker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
background:#000;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
z-index:-1;
}

.container{
width:100%;
max-width:450px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
padding:20px;
box-shadow:0 0 25px rgba(0,255,255,.2);
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
color:#00ffff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.1);
color:white;
}

input::placeholder{
color:#ddd;
}

.upload{
width:100%;
padding:14px;
text-align:center;
background:rgba(255,255,255,.08);
border:2px dashed #00ffff;
border-radius:12px;
cursor:pointer;
margin-bottom:12px;
color:white;
}

.upload input{
display:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#00ffff;
color:black;
font-weight:700;
cursor:pointer;
margin-top:8px;
}

.preview{
margin-top:15px;
height:350px;
border-radius:15px;
overflow:hidden;
background:#111;
display:flex;
justify-content:center;
align-items:center;
color:#aaa;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#ddd;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="logo">APURBO-DAS</div>

<input type="text" id="bgUrl" placeholder="https://i.imgur.com/maXzTgz.jpeg">

<button onclick="setBackground()">
Set Background
</button>

<br><br>

<label class="upload">
📷 Upload Image
<input type="file" id="imageInput" accept="image/*">
</label>

<div class="preview" id="preview">
Image Preview
</div>

<button onclick="downloadImage()">
Download Image
</button>

<div class="footer">
© siliguri-boy
</div>

</div>

<script>

let uploadedImage = "";

function setBackground(){
const url=document.getElementById("bgUrl").value.trim();

if(!url){
alert("Enter Image URL");
return;
}

document.getElementById("bg").style.backgroundImage=
`url('${url}')`;
}

document.getElementById("imageInput")
.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

uploadedImage=e.target.result;

document.getElementById("preview").innerHTML=
`<img src="${uploadedImage}">`;

}

reader.readAsDataURL(file);

});

function downloadImage(){

if(!uploadedImage){
alert("Upload image first");
return;
}

const a=document.createElement("a");
a.href=uploadedImage;
a.download="APURBO-DAS.png";
a.click();

}

</script>

</body>
</html>
