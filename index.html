<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apurbo Reels Downloader</title>

<!-- Stylish Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  /* Background Image */
  background:url('https://i.ibb.co/Xff9W1bf/bd1f47f7dbcd.jpg') no-repeat center center/cover;
  position:relative;
}

/* Dark Blur Overlay */
body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(5px);
}

/* Main Box */
.container{
  position:relative;
  z-index:2;

  width:700px; /* lomba size */
  padding:40px;

  border-radius:30px;

  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);

  backdrop-filter:blur(15px);

  box-shadow:0 10px 40px rgba(0,0,0,.5);

  text-align:center;

  animation:show .8s ease;
}

@keyframes show{
  from{
    transform:translateY(40px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* Logo */
.logo{
  font-size:55px;
  font-weight:700;

  background:linear-gradient(45deg,#ff2d75,#ff7b00);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:2px;

  margin-bottom:10px;
}

/* Description */
.desc{
  color:#eee;
  font-size:18px;
  font-weight:300;

  margin-bottom:35px;
}

/* Input */
input{
  width:100%;
  height:65px;

  border:none;
  outline:none;

  border-radius:18px;

  background:rgba(255,255,255,0.14);

  border:1px solid rgba(255,255,255,0.15);

  padding:0 25px;

  font-size:17px;
  color:#fff;
}

input::placeholder{
  color:#ddd;
}

/* Button */
button{
  width:100%;
  height:65px;

  margin-top:22px;

  border:none;
  border-radius:18px;

  background:linear-gradient(45deg,#ff2d75,#ff7b00);

  color:#fff;

  font-size:20px;
  font-weight:600;

  cursor:pointer;

  transition:.3s;
}

button:hover{
  transform:scale(1.03);
}

/* Result Section */
.result{
  margin-top:30px;
  display:none;
}

/* Video */
video{
  width:100%;
  border-radius:20px;

  box-shadow:0 5px 25px rgba(0,0,0,.4);
}

/* Download Button */
a{
  display:block;

  margin-top:18px;

  padding:16px;

  border-radius:16px;

  background:#fff;

  color:#111;

  text-decoration:none;

  font-size:18px;
  font-weight:600;

  transition:.3s;
}

a:hover{
  transform:scale(1.03);
}

/* Mobile Responsive */
@media(max-width:750px){

  .container{
    width:95%;
    padding:30px;
  }

  .logo{
    font-size:42px;
  }

}

</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop hidden>
  <source src="https://files.catbox.moe/oy92cg.mp4" type="audio/mpeg">
</audio>

<div class="container">

  <div class="logo">Apurbo</div>

  <div class="desc">
    Stylish Instagram Reels Downloader
  </div>

  <input
    type="text"
    id="url"
    placeholder="Paste Instagram Reel Link Here..."
  >

  <button onclick="downloadReel()">
    Download Reel
  </button>

  <div class="result" id="result">

    <video id="video" controls></video>

    <a id="downloadBtn" download>
      Download Now
    </a>

  </div>

</div>

<script>

function downloadReel(){

  let url =
  document.getElementById("url").value

  if(url == ""){

    alert("Paste Instagram Reel Link")

    return
  }

  /* Demo Video */
  let videoUrl =
  "https://www.w3schools.com/html/mov_bbb.mp4"

  document.getElementById("result").style.display =
  "block"

  document.getElementById("video").src =
  videoUrl

  document.getElementById("downloadBtn").href =
  videoUrl
}

</script>

</body>
</html>
